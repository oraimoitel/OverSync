[profile.default]
src      = "contracts"
out      = "out"
libs     = ["node_modules", "lib"]
test     = "test/foundry"
cache_path = "forge-cache"
solc     = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir   = true
remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
  "forge-std/=lib/forge-std/src/",
]

[fuzz]
runs = 256

[invariant]
runs   = 64
depth  = 16
