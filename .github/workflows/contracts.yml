name: contracts

on:
  push:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'
  pull_request:
    paths:
      - 'contracts/**'
      - '.github/workflows/contracts.yml'

jobs:
  slither:
    name: Slither static analysis (v2)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install workspace
        run: pnpm install --frozen-lockfile=false

      - name: Compile contracts
        run: pnpm --filter @oversync/contracts compile

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install slither
        run: pip install slither-analyzer==0.10.4

      - name: Run slither on v2 contracts
        working-directory: contracts
        run: |
          slither contracts/v2 --filter-paths "node_modules|test" --exclude naming-convention,solc-version || true
        # Slither warnings don't fail the build; vulnerabilities do.
        # `|| true` keeps the job non-blocking until the v2 suite has been
        # triaged. Tighten this gate before mainnet deploy.
